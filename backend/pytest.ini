[pytest]
DJANGO_SETTINGS_MODULE = rpg_project.settings

python_files = tests.py test_*.py *_tests.py

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

django_find_project = true

addopts =
    --create-db
    --reuse-db
    --disable-warnings
    --nomigrations

# KLUCZOWE: stabilizacja DB cursorów
DJANGO_DB_KEEPdb = true